name: Build comparison data

# "계산은 Actions에서, 표시만 GitHub Pages에서"
# 1) WINGS 스크래핑  2) SAM/WINGS 파싱 + 비교  3) docs/data.json 커밋
# 토큰/자격증명은 GitHub Secrets 에만 존재하며 클라이언트 HTML 에는 노출되지 않음.

# wings_data/ 는 .gitignore 대상이라 러너에는 WINGS 파일이 없다.
# 따라서 Actions 실행은 항상 WINGS 스크래핑을 동반해야 하며, 수동 실행 전용이다.
on:
  workflow_dispatch:
    inputs:
      months:
        description: 'WINGS 스크래핑 월 (예: "2026_04 2026_05")'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright
        run: python -m playwright install --with-deps chromium

      - name: Build data.json
        env:
          WINGS_USER: ${{ secrets.WINGS_USER }}
          WINGS_PASSWORD: ${{ secrets.WINGS_PASSWORD }}
          WINGS_TOTP_SECRET: ${{ secrets.WINGS_TOTP_SECRET }}
          MONTHS: ${{ inputs.months }}
        run: python backend/build_data.py --scrape $MONTHS

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/codes.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: update comparison data [skip ci]"
            git push
          fi
