name: Build comparison data

# "계산은 Actions에서, 표시만 GitHub Pages에서"
# 소스는 모두 SharePoint(앱 전용 Graph)에서 매 실행마다 새로 내려받는다:
#   01. SAM_files (최신 생산월) · 02. WINGS_data (최신 파일) · 03. model_rules · 04. code
# repo 에는 원본 데이터가 없다. 관리자가 웹의 "데이터 빌드" 버튼(또는 아래 Run workflow)으로
# 수동 실행한다. 토큰/시크릿은 GitHub Secrets 에만 존재한다.

on:
  workflow_dispatch:
    inputs:
      all_months:
        description: '모든 생산월 비교(기본: 최신 생산월만)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: build-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests

      - name: Build data.json (source = SharePoint)
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
        run: |
          python backend/build_data.py --source sharepoint ${{ inputs.all_months && '--all-months' || '' }}

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/codes.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: update comparison data [skip ci]"
            git push
          fi
