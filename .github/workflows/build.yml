name: Build comparison data

# "계산은 Actions에서, 표시만 GitHub Pages에서"
# 1) (옵션) WINGS 스크래핑  2) SAM/WINGS 파싱 + 비교  3) docs/data.json 커밋
# 토큰/자격증명은 GitHub Secrets 에만 존재하며 클라이언트 HTML 에는 노출되지 않음.

on:
  schedule:
    - cron: '0 21 * * *'      # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch:
    inputs:
      months:
        description: 'WINGS 스크래핑 월 (예: "2026_04 2026_05"). 비우면 wings_data/ 최신 파일 사용'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Playwright 브라우저는 WINGS 스크래핑이 필요할 때만 설치
      - name: Install Playwright (scrape only)
        if: ${{ github.event.inputs.months != '' }}
        run: python -m playwright install --with-deps chromium

      - name: Build data.json
        env:
          WINGS_USER: ${{ secrets.WINGS_USER }}
          WINGS_PASSWORD: ${{ secrets.WINGS_PASSWORD }}
          WINGS_TOTP_SECRET: ${{ secrets.WINGS_TOTP_SECRET }}
        run: |
          if [ -n "${{ github.event.inputs.months }}" ]; then
            python backend/build_data.py --scrape ${{ github.event.inputs.months }}
          else
            python backend/build_data.py
          fi

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/codes.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: update comparison data [skip ci]"
            git push
          fi
